{% extends 'base.html' %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-speedometer2"></i> WSLab Status</h4>
<div class="card p-4 mb-3">
  <div class="row g-3">
    {% for a in apps %}
    <div class="col-md-6 col-lg-4">
      <div class="border rounded-3 p-3 h-100">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div>
            <div class="fw-bold">{{ a.name }}</div>
            <div class="small text-secondary">{{ a.note }}</div>
          </div>
          <span class="badge {{ 'bg-success' if a.running else 'bg-danger' }}">{{ 'RUNNING' if a.running else 'DOWN' }}</span>
        </div>
        <div class="small">Port: <code>{{ a.port }}</code></div>
        <div class="small">PID: <code>{{ a.pid }}</code></div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
<div class="card p-4">
  <div class="row g-3">
    <div class="col-md-4"><div class="border rounded-3 p-3"><div class="small text-secondary">RAM</div><div class="fw-bold">{{ mem }}</div></div></div>
    <div class="col-md-4"><div class="border rounded-3 p-3"><div class="small text-secondary">Uptime</div><div class="fw-bold">{{ uptime }}</div></div></div>
    <div class="col-md-4"><div class="border rounded-3 p-3"><div class="small text-secondary">Load</div><div class="fw-bold">{{ load }}</div></div></div>
  </div>
</div>
{% endblock %}

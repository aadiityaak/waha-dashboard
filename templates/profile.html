{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-3">
  <div class="col-lg-5 col-md-6 col-12">
    <div class="card p-4">
      <h4 class="mb-3"><i class="bi bi-person-circle"></i> Edit Profile</h4>
      <form method="post" action="{{ app_root }}/profile">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input name="username" class="form-control" value="{{ profile_user.username }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password Saat Ini</label>
          <div class="input-group">
            <input name="current_password" type="password" class="form-control password-input" placeholder="isi kalau mau ganti password">
            <button class="btn btn-outline-secondary toggle-password" type="button"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password Baru</label>
          <div class="input-group">
            <input name="new_password" type="password" class="form-control password-input" placeholder="minimal 6 karakter">
            <button class="btn btn-outline-secondary toggle-password" type="button"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Konfirmasi Password Baru</label>
          <div class="input-group">
            <input name="confirm_password" type="password" class="form-control password-input" placeholder="ulang password baru">
            <button class="btn btn-outline-secondary toggle-password" type="button"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary">Simpan Perubahan</button>
          <a href="{{ app_root }}/" class="btn btn-outline-secondary">Kembali</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}<script src="{{ app_root }}/static/app.js"></script>{% endblock %}
